<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inicio · GmailDashboard</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
    <header class="topbar">
        <a th:href="@{/}" class="brand">GmailDashboard</a>
    </header>
    <main class="container">
        <section class="hero">
            <h1>Bienvenido a <span class="highlight">GmailDashboard</span></h1>
            <p>Aplicación demostrativa de Spring Boot con autenticación OAuth2 con Google.</p>
            <div th:if="${loggedIn}">
                <p style="margin-bottom:20px">Hola, <strong th:text="${name}">Usuario</strong>.</p>
                <a th:href="@{/dashboard}" class="btn-primary">Ir al Dashboard</a>
            </div>
            <div th:unless="${loggedIn}">
                <a th:href="@{/login}" class="btn-primary">Iniciar sesión con Google</a>
            </div>
        </section>
    </main>
</body>

</html>
