<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión · GmailDashboard</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="login-page">
    <main class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48">
                    <path fill="#4285F4" d="M24 5.4C13.7 5.4 5.4 13.7 5.4 24S13.7 42.6 24 42.6 42.6 34.3 42.6 24 34.3 5.4 24 5.4z"/>
                    <path fill="white" d="M10.5 24l13.5-9 13.5 9-13.5 9z"/>
                </svg>
            </div>
            <h1 class="login-title">GmailDashboard</h1>
            <p class="login-subtitle">Accede con tu cuenta de Google para continuar</p>
            <a th:href="@{/oauth2/authorization/google}" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Continuar con Google
            </a>
        </div>
    </main>
</body>

</html>
